Port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
unified-delay: true
tcp-fast-open: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
keep-alive-interval: 10

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  nameserver:
    - https://dns.adguard-dns.com/dns-query
    - https://dns.nextdns.io/
    - 8.8.8.8
    - 1.1.1.1
  default-nameserver:
    - 8.8.8.8
  fake-ip-filter:
    - 'connectivitycheck.gstatic.com'
    - 'connectivitycheck.android.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    - 'clients3.google.com'
    - '*.whatsapp.net'
    - '*.whatsapp.com'
    - '*.google.com'
    - 'domain:*.xl.co.id'
    - 'domain:*.xlaxiata.id'
    - 'domain:*.myxl.co.id'
    - 'domain:*.axisnet.id'

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

proxy-providers:
  Akun-VPN:
    type: http
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/vpn.yaml"
    interval: 86400
    path: "./provider/vpn.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 150
      timeout: 2000

proxy-groups:
  - name: VPN
    type: select
    proxies:
      - REJECT
    use:
      - Akun-VPN
    url: http://cp.cloudflare.com/generate_204
    interval: 150
    tolerance: 100
    timeout: 2000

rule-providers:
  # Menggunakan format classical untuk stabilitas maksimal di Android
  Global_Ads:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/reject.txt"
    path: ./ruleset/global_ads.yaml
    interval: 86400

  Asia_Indo_Ads:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/ads.txt"
    path: ./ruleset/anti_ad.yaml
    interval: 86400

  Privacy_Tracker:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-ruleset/release/privacy.txt"
    path: ./ruleset/privacy.yaml
    interval: 86400

  Rule_TikTok:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/tiktok.yaml"
    interval: 86400
    path: "./provider/tiktok.yaml"

  Rule_WhatsApp:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/whatsapp.yaml"
    interval: 86400
    path: "./provider/whatsapp.yaml"

  Rule_YouTube:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/youtube.yaml"
    interval: 86400
    path: "./provider/youtube.yaml"

  Rule_MyXL:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/myxl.yaml"
    interval: 86400
    path: "./provider/myxl.yaml"

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - GEOIP,LAN,DIRECT

  # ADSBLOCKING (Eksekusi REJECT)
  - RULE-SET,Global_Ads,REJECT
  - RULE-SET,Asia_Indo_Ads,REJECT
  - RULE-SET,Privacy_Tracker,REJECT
  - DOMAIN-KEYWORD,ads,REJECT
  - DOMAIN-KEYWORD,adservice,REJECT

  # App Rules
  - RULE-SET,Rule_WhatsApp,VPN
  - RULE-SET,Rule_TikTok,VPN
  - RULE-SET,Rule_YouTube,VPN
  - RULE-SET,Rule_MyXL,DIRECT
  
  - GEOIP,ID,VPN
  - MATCH,VPN
