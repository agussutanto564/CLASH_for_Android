  - DOMAIN-SUFFIX,pangle.io,ADS-BLOCKER
  - DOMAIN-SUFFIX,snssdk.com,ADS-BLOCKER

  - RULE-SET,Ads_Ultimate,ADS-BLOCKER
  - RULE-SET,Ads_Indo,ADS-BLOCKER
