sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

proxy-providers:
  Akun-VPN:
    type: http
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/vpn.yaml"
    interval: 86400
    path: "./provider/vpn.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 150
      timeout: 2000

proxy-groups:
  - name: VPN
    type: select
    use:
      - Akun-VPN
    proxies:
      - "ADS-BLOCKER"

  - name: "ADS-BLOCKER"
    type: select
    proxies:
      - "AD-ON"
      - "AD-OFF-VPN"
      - "AD-OFF-DIRECT"

  - name: "AD-ON"
    type: select
    proxies:
      - REJECT

  - name: "AD-OFF-VPN"
    type: select
    use:
      - Akun-VPN

  - name: "AD-OFF-DIRECT"
    type: select
    proxies:
      - DIRECT

rule-providers:
  Ads_Ultimate:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./provider/ads_ultimate.yaml
    interval: 86400
  Ads_Indo:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/abpindo.yaml"
    path: ./provider/ads_indo.yaml
    interval: 86400
  Ads_Global:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/oisd_big.yaml"
    path: ./provider/ads_global.yaml
    interval: 86400
  Ads_Mobile:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/alfatihart/clashBlock/main/adaway.yaml"
    path: ./provider/ads_mobile.yaml
    interval: 86400
  Rule_TikTok:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/tiktok.yaml"
    interval: 86400
    path: "./provider/tiktok.yaml"
  Rule_WhatsApp:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/whatsapp.yaml"
    interval: 86400
    path: "./provider/whatsapp.yaml"
  Rule_YouTube:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/youtube.yaml"
    interval: 86400
    path: "./provider/youtube.yaml"
  Rule_MyXL:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/myxl.yaml"
    interval: 86400
    path: "./provider/myxl.yaml"
  Rule_MLBB:  
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/mlbb.yaml"
    interval: 86400
    path: "./provider/mlbb.yaml"

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
