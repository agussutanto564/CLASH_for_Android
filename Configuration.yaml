port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
udp: true
mode: rule
log-level: silent
allow-lan: true
unified-delay: true
tcp-fast-open: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
keep-alive-interval: 10

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fake-ip-filter:
    - 'connectivitycheck.gstatic.com'
    - 'connectivitycheck.android.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    - 'clients3.google.com'
    - '*.whatsapp.net'
    - '*.whatsapp.com'
    - '*.google.com'
    - '*.kemdikbud.go.id'
    - 'domain:*.xl.co.id'
    - 'domain:*.xlaxiata.id'
    - 'domain:*.myxl.co.id'
    - 'domain:*.axisnet.id'
    - 'domain:+.xl.co.id'
    - 'domain:+.xlaxiata.id'
    - 'domain:myxl.co.id'
    - 'domain:axisnet.id'
    - 'domain:support.udemy.com'
    - 'domain:+.udemy.com'
    - 'domain:+.ruangguru.com'
    - 'domain:id-atha001.kegiatankerja.my.id'
    - 'domain:+.kegiatankerja.my.id'
  #tiktok
    - '*.tiktokv.com'
    - '*.byteoversea.com'
    - '*.tik-tokapi.com'
    - '*.ibytedtos.com'
    - '*.myqcloud.com'
    - '*.tiktokcdn.com'
    - '*.tiktok.com'
    - '*.ttcdn-tos.com'
    - '*.pstatp.com'
    - '*.snssdk.com'
    - '*.isnssdk.com'
    - '*.byteocdn.com'

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

proxy-providers:
  Akun-VPN:
    type: http
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/vpn.yaml"
    interval: 86400
    path: "./provider/vpn.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 150
      timeout: 2000

proxy-groups:
  # SATU-SATUNYA TAB DI LAYAR UTAMA
  - name: VPN
    type: select
    use:
      - Akun-VPN
    proxies:
      - ADS-OFF

  # Grup ini disembunyikan agar tab kedua tidak muncul di atas
  - name: ADS-OFF
    type: select
    hidden: true
    use:
      - Akun-VPN

rule-providers:
  Ads_Ultimate:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./provider/ads_ultimate.yaml
    interval: 86400
  Ads_Indo:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/abpindo.yaml"
    path: ./provider/ads_indo.yaml
    interval: 86400
  Ads_Global:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/oisd_big.yaml"
    path: ./provider/ads_global.yaml
    interval: 86400
  Ads_Mobile:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/alfatihart/clashBlock/main/adaway.yaml"
    path: ./provider/ads_mobile.yaml
    interval: 86400
  Rule_TikTok:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/tiktok.yaml"
    interval: 86400
    path: "./provider/tiktok.yaml"
  Rule_WhatsApp:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/whatsapp.yaml"
    interval: 86400
    path: "./provider/whatsapp.yaml"
  Rule_YouTube:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/youtube.yaml"
    interval: 86400
    path: "./provider/youtube.yaml"
  Rule_MLBB:  
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/mlbb.yaml"
    interval: 86400
    path: "./provider/mlbb.yaml"

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - GEOIP,LAN,DIRECT

  # LOGIKA 1 TAB:
  # Pilih Server -> Iklan REJECT (Mati)
  # Pilih ADS-OFF -> Iklan ikut jalur VPN (Tetap gratis & Iklan muncul)
  - RULE-SET,Ads_Ultimate,REJECT
  - RULE-SET,Ads_Indo,REJECT
  - RULE-SET,Ads_Global,REJECT
  - RULE-SET,Ads_Mobile,REJECT

  # Aplikasi
  - RULE-SET,Rule_WhatsApp,VPN
  - RULE-SET,Rule_TikTok,VPN
  - RULE-SET,Rule_YouTube,VPN
  - RULE-SET,Rule_MLBB,VPN
  
  - GEOIP,ID,VPN
  - MATCH,VPN
