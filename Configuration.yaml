# --- CLASH (STREAMING OPTIMIZED) ---
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
udp: true
mode: rule
log-level: silent
allow-lan: true
unified-delay: false        
tcp-fast-open: false        
tcp-concurrent: true
external-controller: 127.0.0.1:9090
keep-alive-interval: 10

# --- DNS SETTINGS ---
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  default-nameserver: [8.8.8.8, 1.1.1.1]
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fake-ip-filter:
    - '+.gstatic.com'
    - '+.google.com'
    - '+.android.com'
    - '+.kegiatankerja.my.id'
    - '+.whatsapp.net'
    - '+.whatsapp.com'
    - '+.tiktok.com'
    - '+.tiktokv.com'
    - '+.tiktokcdn.com'
    - '+.byteoversea.com'
    - '+.ibytedtos.com'
    - '+.myqcloud.com'
    - '+.snssdk.com'
    - '+.pstatp.com'
    - '+.ibyteimg.com'

# --- SNIFFER ---
sniffer:
  enable: true
  sniff:
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880]}

# --- PROXY PROVIDER ---
proxy-providers:
  Akun-VPN:
    type: http
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/vpn.yaml"
    interval: 3600
    path: "./vpn.yaml"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 2000

# --- PROXY GROUPS ---
proxy-groups:
  # GRUP UTAMA (ADS-ON di urutan pertama agar otomatis AKTIF)
  - name: VPN
    type: select
    proxies:
      - ADS-ON
      - ADS-OFF

  - name: ADS-ON
    type: select
    use:
      - Akun-VPN

  - name: ADS-OFF
    type: select
    use:
      - Akun-VPN

# --- RULE PROVIDER ---
rule-providers:
  Ads_Ultimate:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ads_ultimate.yaml
    interval: 86400
  Ads_Indo:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/abpindo.yaml"
    path: ./ads_indo.yaml
    interval: 86400
  Ads_Global:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/hillz2/openclash_adblock/main/oisd_big.yaml"
    path: ./ads_global.yaml
    interval: 86400
  Ads_Mobile:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/alfatihart/clashBlock/main/adaway.yaml"
    path: ./ads_mobile.yaml
    interval: 86400
  Rule_TikTok:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/tiktok.yaml"
    interval: 86400
    path: "./tiktok.yaml"
  Rule_WhatsApp:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/whatsapp.yaml"
    interval: 86400
    path: "./whatsapp.yaml"
  Rule_YouTube:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/youtube.yaml"
    interval: 86400
    path: "./youtube.yaml"
  Rule_GoTube:  
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/gotube.yaml"
    interval: 86400
    path: "./gotube.yaml"
  Rule_MLBB:  
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/agussutanto564/CLASH_for_Android/main/provider/mlbb.yaml"
    interval: 86400
    path: "./mlbb.yaml"
    
# --- RULES ---
rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - GEOIP,LAN,DIRECT

  # 1. PRIORITAS SOSMED & GAME (Melalui grup VPN pilihan user)
  - DOMAIN-KEYWORD,tiktok,VPN
  - RULE-SET,Rule_TikTok,VPN
  - RULE-SET,Rule_WhatsApp,VPN
  - RULE-SET,Rule_YouTube,VPN
  - RULE-SET,Rule_GoTube,VPN
  - RULE-SET,Rule_MLBB,VPN

  # 2. LOGIKA ADBLOCK (Hanya merejek jika ADS-ON yang terpilih di grup VPN)
  - RULE-SET,Ads_Ultimate,REJECT,proxy-select=ADS-ON
  - RULE-SET,Ads_Indo,REJECT,proxy-select=ADS-ON
  - RULE-SET,Ads_Global,REJECT,proxy-select=ADS-ON
  - RULE-SET,Ads_Mobile,REJECT,proxy-select=ADS-ON

  # 3. GLOBAL CATCH
  - GEOIP,ID,VPN
  - MATCH,VPN
