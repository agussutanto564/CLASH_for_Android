  - DOMAIN-SUFFIX,app-measurement.com,ADS-BLOCKER
  - DOMAIN-SUFFIX,analytics.google.com,ADS-BLOCKER
  - DOMAIN-SUFFIX,ads.youtube.com,ADS-BLOCKER
  - DOMAIN-SUFFIX,crashlytics.com,ADS-BLOCKER
