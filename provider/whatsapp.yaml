  # --- [1] PROCESS NAMES (Anti-Delay Notifikasi) ---
  - PROCESS-NAME,com.whatsapp
  - PROCESS-NAME,com.whatsapp.w4b

  # --- [2] DOMAIN KEYWORD (Jalur Utama Chat & Status) ---
  - DOMAIN-KEYWORD,whatsapp
  - DOMAIN-KEYWORD,ws.whatsapp
  - DOMAIN-KEYWORD,web.whatsapp
  - DOMAIN-KEYWORD,media-cgk
  - DOMAIN-KEYWORD,media-sin
  - DOMAIN-KEYWORD,pps.whatsapp
  - DOMAIN-KEYWORD,wa.me

  # --- [3] DOMAIN SUFFIX (Aset Media, Sticker & Backup) ---
