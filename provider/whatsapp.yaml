  - DOMAIN-SUFFIX,whatsapp.com
  - DOMAIN-SUFFIX,whatsapp.tv
  - DOMAIN-SUFFIX,fbcdn.net
  - DOMAIN-SUFFIX,facebook.com
  - DOMAIN-SUFFIX,m.facebook.com
  - DOMAIN-SUFFIX,cdn.whatsapp.net
  - DOMAIN-SUFFIX,static.whatsapp.net
  - DOMAIN-SUFFIX,g.whatsapp.net
  - DOMAIN-SUFFIX,mmg.whatsapp.net

  # --- [4] VOIP & CALL OPTIMIZATION (Jalur Telepon Jernih) ---
