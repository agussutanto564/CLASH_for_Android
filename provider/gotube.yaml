  # --- [ PRIORITAS 0: PROCESS NAME ] ---
  # Menangkap semua traffic GoTube agar tidak bocor ke Direct
  - PROCESS-NAME,premium.gotube.adblock.utube

  # --- [ PRIORITAS 1: KEYWORD SEARCH ] ---
  - DOMAIN-KEYWORD,youtube
  - DOMAIN-KEYWORD,googlevideo
  - DOMAIN-KEYWORD,gotube
  - DOMAIN-KEYWORD,ytimg
  - DOMAIN-KEYWORD,ggpht
  - DOMAIN-KEYWORD,youtube-ui
  - DOMAIN-KEYWORD,play-google

  # --- [ PRIORITAS 2: CORE VIDEO STREAMING ] ---
  # Jalur utama data video agar tidak lambat loading awal
  - DOMAIN-SUFFIX,googlevideo.com
  - DOMAIN-SUFFIX,ytimg.com
  - DOMAIN-SUFFIX,youtube.com
  - DOMAIN-SUFFIX,youtu.be
  - DOMAIN-SUFFIX,ggpht.com
  - DOMAIN-SUFFIX,youtube-nocookie.com

  # --- [ PRIORITAS 3: GOTUBE API & ASSETS ] ---
  - DOMAIN-SUFFIX,gotube.pro
  - DOMAIN-SUFFIX,vube.app
  - DOMAIN-SUFFIX,gotube-api.com
  
  # --- [ PRIORITAS 4: GOOGLE SERVICES (Wajib untuk Akun & Thumbnail) ] ---
